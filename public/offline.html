<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockDan — Sem conexão</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030712;
      color: #e5e7eb;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #22c55e1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    h1 { font-size: 1.25rem; font-weight: 600; color: #f9fafb; margin-bottom: 8px; }
    p  { font-size: 0.875rem; color: #6b7280; line-height: 1.5; max-width: 300px; }
    button {
      margin-top: 24px;
      padding: 10px 24px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
      stroke="#22c55e" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39
        M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88
        M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
  </div>
  <h1>Sem conexão com a internet</h1>
  <p>Você está offline. As retiradas registradas serão enviadas automaticamente quando a conexão for restaurada.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
